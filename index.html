<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"  content="width=device-width, initial-scale=1.0">
  <title>Member Milestones — Unrivaled Fitness</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="header-logo" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <rect x="2" y="16" width="8" height="8" rx="2" fill="currentColor"/>
          <rect x="30" y="16" width="8" height="8" rx="2" fill="currentColor"/>
          <rect x="10" y="12" width="6" height="16" rx="2" fill="currentColor"/>
          <rect x="24" y="12" width="6" height="16" rx="2" fill="currentColor"/>
          <rect x="16" y="18" width="8" height="4" rx="1" fill="currentColor"/>
        </svg>
        <div>
          <h1 class="gym-name">UNRIVALED FITNESS</h1>
          <p class="page-subtitle">Member Milestones Tracker</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ── Loading State ──────────────────────────────────────────── -->
    <div id="loading-state" class="loading-state">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading milestone data…</p>
    </div>

    <!-- ── Error State ────────────────────────────────────────────── -->
    <div id="error-state" class="error-state hidden" role="alert">
      <p id="error-message"></p>
    </div>

    <!-- ── Results Section ───────────────────────────────────────── -->
    <section id="results-section" class="results-section hidden" aria-live="polite">

      <div class="results-top no-print">
        <h2 class="results-heading">Milestone Achievements</h2>
        <button class="btn btn-outline" onclick="window.print()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Print
        </button>
      </div>

      <div class="print-header">
        <p class="print-date" id="print-date"></p>
      </div>

      <div id="stats-bar" class="stats-bar no-print"></div>

      <div id="milestones-container" class="milestones-container"></div>
 
    </section>

  </main>

  <footer class="site-footer">
    <p>Unrivaled Fitness &copy; <span id="footer-year"></span> &bull; Member Milestones Tracker</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
